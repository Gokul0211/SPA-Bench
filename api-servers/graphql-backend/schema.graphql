  createUser(input: CreateUserInput!): User!

  """
  EP-E-GQL-010 — updateOrder(id: ID!, input: UpdateOrderInput!): Order
  Auth: bearer required. Exclusively discoverable via introspection.
  """
  updateOrder(id: ID!, input: UpdateOrderInput!): Order!

  """
  EP-E-GQL-011 — deleteProduct(id: ID!): Boolean
  Auth: bearer required. Exclusively discoverable via introspection.
  """
  deleteProduct(id: ID!): Boolean!

  """
  EP-E-GQL-012 — processCheckout(cartId: ID!, paymentMethod: PaymentInput!): Order
  Auth: bearer required. Exclusively discoverable via introspection.
  """
  processCheckout(cartId: ID!, paymentMethod: PaymentInput!): Order!

  """
  EP-E-GQL-013 — inviteTeamMember(workspaceId: ID!, email: String!, role: Role!): TeamMember
  Auth: bearer required. Exclusively discoverable via introspection.
  """
  inviteTeamMember(workspaceId: ID!, email: String!, role: Role!): TeamMember!

  """
  EP-E-GQL-014 — updateBilling(workspaceId: ID!, plan: BillingPlan!): BillingInfo
  Auth: bearer required. Exclusively discoverable via introspection.
  """
  updateBilling(workspaceId: ID!, plan: BillingPlan!): BillingInfo!
