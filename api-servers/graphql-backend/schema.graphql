  """
  EP-E-GQL-017 — teamActivityFeed(workspaceId: ID!): ActivityEvent
  Auth: bearer required. Exclusively discoverable via introspection.
  Real-time team activity stream.
  """
  teamActivityFeed(workspaceId: ID!): ActivityEvent!
