#   EP-E-GQL-015    Subscription.orderStatusChanged  graphql_subscription_resolver
#   EP-E-GQL-016    Subscription.dashboardMetricsUpdated  graphql_subscription_resolver
#   EP-E-GQL-017    Subscription.teamActivityFeed    graphql_subscription_resolver
#
# Introspection: ENABLED — TC-P4-002 (graphql_introspection)
# All 17 resolver signatures must be fully visible in __schema response.

scalar DateTime

# ── Enums ────────────────────────────────────────────────────────────────────

"""
Order lifecycle status — used in listOrders filter and orderStatusChanged subscription.
"""
enum OrderStatus {
  PENDING
  PROCESSING
  SHIPPED
  DELIVERED
  CANCELLED
  REFUNDED
}

"""
Time granularity for dashboard metrics aggregation.
"""
enum Granularity {
  HOURLY
  DAILY
  WEEKLY
  MONTHLY
}

"""
Workspace member role — controls permissions and filters listTeamMembers.
"""
enum Role {
  OWNER
  ADMIN
  MEMBER
  VIEWER
}

"""
SaaS billing plan tiers.
"""
enum BillingPlan {
  FREE
  STARTER
  PRO
  ENTERPRISE
}

# ── Core Types ────────────────────────────────────────────────────────────────

type User {
  id: ID!
  email: String!
  username: String!
  fullName: String!
  role: Role!
  workspaceId: ID!
  createdAt: DateTime!
  lastLoginAt: DateTime
}

type LineItem {
  sku: String!
  quantity: Int!
  unitPrice: Float!
  total: Float!
}

type Order {
  id: ID!
  userId: ID!
  status: OrderStatus!
  lineItems: [LineItem!]!
  total: Float!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Review {
  reviewId: ID!
  rating: Int!
  comment: String!
  author: String!
  date: String!
}

type Product {
  id: ID!
  sku: String!
  name: String!
  category: String!
  price: Float!
  stock: Int!
  rating: Float!
  reviewCount: Int!
  description: String
  reviews: [Review!]
}

type MetricDataPoint {
  bucket: String!
  revenue: Float!
  users: Int!
}

type DashboardMetrics {
  period: String!
  granularity: Granularity
  totalRevenue: Float!
  activeUsers: Int!
  newSignups: Int!
  churnRate: Float!
  mrr: Float!
  conversionRate: Float!
  timeSeries: [MetricDataPoint!]!
  generatedAt: DateTime!
}

type AuditEntry {
  id: ID!
  resourceId: ID!
  action: String!
  performedBy: String!
  details: String
  timestamp: DateTime!
}

type TeamMember {
  id: ID!
  workspaceId: ID!
  userId: ID!
  email: String!
  fullName: String!
  role: Role!
  joinedAt: DateTime!
}

type BillingInfo {
  workspaceId: ID!
  plan: BillingPlan!
  status: String!
  currentPeriodStart: DateTime!
  currentPeriodEnd: DateTime!
  monthlyAmount: Float!
  seats: Int!
  usedSeats: Int!
}

type ActivityEvent {
  workspaceId: ID!
  userId: ID!
  action: String!
  resourceType: String!
  resourceId: ID!
  timestamp: DateTime!
}

# ── Input Types ───────────────────────────────────────────────────────────────

"""
Input for createUser mutation (EP-E-GQL-009).
"""
input CreateUserInput {
  email: String!
  username: String!
  fullName: String!
  role: Role!
  workspaceId: ID!
}

"""
Input for updateOrder mutation (EP-E-GQL-010).
"""
input UpdateOrderInput {
  status: OrderStatus
  lineItems: [LineItemInput!]
}

input LineItemInput {
  sku: String!
  quantity: Int!
  unitPrice: Float!
}

"""
Payment method input for processCheckout mutation (EP-E-GQL-012).
"""
input PaymentInput {
  type: String!
  cardToken: String
  billingAddress: AddressInput
}

input AddressInput {
  line1: String!
  line2: String
  city: String!
  postalCode: String!
  country: String!
}

"""
Filter input for searchProducts query (EP-E-GQL-004).
"""
input ProductFilter {
  category: String
  minPrice: Float
  maxPrice: Float
  inStock: Boolean
}

