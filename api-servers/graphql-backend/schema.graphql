  """
  EP-E-GQL-001 — getUser(id: ID!): User
  Auth: bearer required.
  Recoverable via introspection or user.resolver.ts source map.
  """
  getUser(id: ID!): User

  """
  EP-E-GQL-002 — listOrders(userId: ID!, status: OrderStatus, limit: Int): [Order]
  Auth: bearer required.
  All argument types recovered from introspection schema.
  """
  listOrders(userId: ID!, status: OrderStatus, limit: Int): [Order!]!

  """
  EP-E-GQL-003 — getProduct(id: ID!, includeReviews: Boolean): Product
  Auth: none — public resolver.
  """
  getProduct(id: ID!, includeReviews: Boolean): Product

  """
  EP-E-GQL-004 — searchProducts(query: String!, filters: ProductFilter): [Product]
  Auth: none — public resolver.
  """
  searchProducts(query: String!, filters: ProductFilter): [Product!]!

  """
  EP-E-GQL-005 — getDashboardMetrics(period: String!, granularity: Granularity): DashboardMetrics
  Auth: bearer required.
  """
  getDashboardMetrics(period: String!, granularity: Granularity): DashboardMetrics

  """
  EP-E-GQL-006 — getAuditLog(resourceId: ID!, from: DateTime, to: DateTime): [AuditEntry]
  Auth: bearer required.
  """
  getAuditLog(resourceId: ID!, from: DateTime, to: DateTime): [AuditEntry!]!

  """
  EP-E-GQL-007 — listTeamMembers(workspaceId: ID!, role: Role): [TeamMember]
  Auth: bearer required.
  """
  listTeamMembers(workspaceId: ID!, role: Role): [TeamMember!]!

  """
  EP-E-GQL-008 — getBillingInfo(workspaceId: ID!): BillingInfo
  Auth: bearer required.
  """
  getBillingInfo(workspaceId: ID!): BillingInfo
}

